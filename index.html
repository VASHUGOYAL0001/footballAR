<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hidden Football AR Table Game</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.85);
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --neon-blue: #00e5ff;
            --text-main: #f0f6fc;
            --grass-dark: #1b4d3e;
            --grass-light: #22644d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        #app-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 10;
        }

        .screen.active {
            display: flex;
        }

        #menu-screen {
            background: radial-gradient(circle at center, #1f2937 0%, #0b0f19 100%);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: var(--neon-green);
            color: #000;
        }

        .btn-primary:hover {
            background: #2ce20f;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .btn-secondary {
            background: var(--neon-blue);
            color: #000;
        }

        .btn-secondary:hover {
            background: #00ccd4;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .input-group {
            margin: 20px 0;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 2px;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-blue);
        }

        #referee-screen {
            background: #000;
            padding: 0;
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #referee-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: auto;
        }

        .referee-ui-layer {
            position: absolute;
            z-index: 3;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            pointer-events: none;
        }

        .interactive-element {
            pointer-events: auto;
        }

        #player-screen {
            background: repeating-linear-gradient(
                90deg,
                var(--grass-dark),
                var(--grass-dark) 40px,
                var(--grass-light) 40px,
                var(--grass-light) 80px
            );
            padding: 0;
            position: relative;
        }

        #restricted-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 49, 49, 0.4);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: pulse-red 1s infinite alternate;
            pointer-events: none;
        }

        @keyframes pulse-red {
            from { background-color: rgba(255, 49, 49, 0.3); }
            to { background-color: rgba(255, 49, 49, 0.7); }
        }

        .warning-banner {
            background: #000;
            color: var(--neon-red);
            padding: 20px 40px;
            font-size: 2rem;
            font-weight: bold;
            border: 3px solid var(--neon-red);
            border-radius: 8px;
            box-shadow: 0 0 30px var(--neon-red);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        #player-rendering-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .fullscreen-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 90;
            display: none;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        #ball-found-effect {
            background: rgba(57, 255, 20, 0.2);
        }

        #goal-effect {
            background: rgba(0, 229, 255, 0.3);
        }

        .effect-text {
            font-size: 3.5rem;
            font-weight: 900;
            text-shadow: 0 0 20px currentColor;
            animation: pop-up 0.5s ease-out;
        }

        @keyframes pop-up {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); }
        }

        .hud-panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #touch-joystick-zone {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255,255,255,0.3);
            pointer-events: auto;
            touch-action: none;
        }

        #joystick-knob {
            width: 50px;
            height: 50px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-blue);
            transition: transform 0.05s linear;
        }

        .flex-row-between {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="app-container">

    <div id="menu-screen" class="screen active">
        <div class="glass-panel">
            <h1>Hidden Football AR</h1>
            <p style="color: #8b949e; margin-bottom: 20px; font-size: 0.9rem;">Serverless Real-Time P2P Physical Table System</p>
            
            <div class="input-group">
                <label for="username-input">Player Nickname</label>
                <input type="text" id="username-input" value="Striker_X" maxlength="12">
            </div>

            <div class="input-group">
                <label for="room-input">Room Join Code</label>
                <input type="text" id="room-input" value="REFCAM" maxlength="8">
            </div>

            <div style="margin-top: 30px;">
                <button id="btn-join-player" class="btn btn-primary">Join as Player Device</button>
                <button id="btn-host-ref" class="btn btn-secondary">Setup Referee Camera</button>
            </div>
        </div>
    </div>

    <div id="referee-screen" class="screen">
        <video id="camera-feed" autoplay playsinline muted></video>
        <canvas id="referee-overlay"></canvas>
        
        <div class="referee-ui-layer">
            <div class="flex-row-between">
                <div class="hud-panel" id="ref-room-display">ROOM: --</div>
                <div class="hud-panel" id="ref-status-display" style="color: #ffb703;">TAP BALL ON SCREEN TO LOCK COLOR</div>
            </div>
            
            <div></div>

            <div class="flex-row-between">
                <button id="btn-ref-reset-ball" class="btn btn-secondary interactive-element" style="width: auto; padding: 10px 20px; margin: 0;">Reset Ball Position</button>
                <button class="btn btn-primary interactive-element exit-to-menu-btn" style="width: auto; padding: 10px 20px; margin: 0; background: #333; color: #fff;">Exit</button>
            </div>
        </div>
    </div>

    <div id="player-screen" class="screen">
        <canvas id="player-rendering-canvas"></canvas>
        
        <div id="restricted-overlay">
            <div class="warning-banner">RESTRICTED ZONE!</div>
            <p style="color: #fff; margin-top: 10px; font-weight: bold; background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 4px;">RETREAT TO YOUR OWN HALF</p>
        </div>

        <div id="ball-found-effect" class="fullscreen-effect">
            <div class="effect-text" style="color: var(--neon-green);">BALL FOUND</div>
        </div>

        <div id="goal-effect" class="fullscreen-effect">
            <div class="effect-text" style="color: var(--neon-blue);">GOAL!!!</div>
        </div>

        <div id="touch-joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div class="referee-ui-layer">
            <div class="flex-row-between">
                <div class="hud-panel" id="player-status-hud">SEARCHING FOR BALL...</div>
                <div class="hud-panel" id="player-possession-hud" style="color: #fff; border-color: #555;">NO POSSESSION</div>
            </div>
            
            <div style="text-align: center; width: 100%;">
                <div id="swipe-tip" style="display:none; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 8px; display: inline-block; font-size: 0.85rem; border: 1px solid var(--neon-green);">
                    SWIPE UP FAST TO SHOOT
                </div>
            </div>

            <div class="flex-row-between">
                <div class="hud-panel" id="player-coords-hud">X: 0.50 | Y: 0.70</div>
                <button class="btn interactive-element exit-to-menu-btn" style="width: auto; padding: 8px 16px; margin: 0; background: rgba(255,255,255,0.1); color: #fff; border-radius: 20px; font-size: 0.8rem;">Leave Match</button>
            </div>
        </div>
    </div>

</div>

<script>
    // System Configurations
    const FIELD_ASPECT_RATIO = 1.5;
    const PROXIMITY_THRESHOLD = 0.09; 
    const RESTRICTED_ZONE_Y_LIMIT = 0.25;

    let state = {
        role: null,            
        roomCode: '',
        username: '',
        peer: null,
        connection: null,      
        connectedPlayers: {},  
        ball: { x: 0.5, y: 0.5, vx: 0, vy: 0, possessedBy: null },
        localPlayer: { id: '', name: '', x: 0.5, y: 0.7, team: 'A', inRestrictedZone: false },
        targetColor: { r: 0, g: 0, b: 0 }, 
        isColorCalibrated: false
    };

    const screens = {
        menu: document.getElementById('menu-screen'),
        referee: document.getElementById('referee-screen'),
        player: document.getElementById('player-screen')
    };

    document.getElementById('btn-host-ref').addEventListener('click', () => initializeSession('referee'));
    document.getElementById('btn-join-player').addEventListener('click', () => initializeSession('player'));
    
    document.querySelectorAll('.exit-to-menu-btn').forEach(btn => {
        btn.addEventListener('click', () => location.reload());
    });

    function initializeSession(chosenRole) {
        state.role = chosenRole;
        state.roomCode = document.getElementById('room-input').value.trim().toUpperCase();
        state.username = document.getElementById('username-input').value.trim();

        if(!state.roomCode) { alert('Please enter a Room Code'); return; }
        if(!state.username && state.role === 'player') { alert('Please choose a Nickname'); return; }

        switchActiveScreen(state.role);

        if (state.role === 'referee') {
            state.peer = new Peer(`HFB-ROOM-${state.roomCode}`);
            setupRefereeNetworkListeners();
            initRefereeHardwareCamera();
        } else {
            state.peer = new Peer(); 
            setupPlayerNetworkListeners();
        }
    }

    function switchActiveScreen(role) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[role].classList.add('active');
        try { if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); } catch(e){}
    }

    /**
     * REFEREE HOST ENGINE
     */
    function setupRefereeNetworkListeners() {
        document.getElementById('ref-room-display').innerText = `ROOM: ${state.roomCode}`;
        
        state.peer.on('open', (id) => {
            console.log('Referee Node Host active:', id);
        });

        state.peer.on('error', (err) => {
            alert("Room Code registration failed. Try a different, unique code!");
            location.reload();
        });

        state.peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.type === 'JOIN') {
                    state.connectedPlayers[conn.peer] = {
                        id: conn.peer,
                        name: data.name,
                        x: 0.5,
                        y: 0.7,
                        conn: conn
                    };
                }
                if (data.type === 'PLAYER_UPDATE') {
                    if (state.connectedPlayers[conn.peer]) {
                        state.connectedPlayers[conn.peer].x = data.x;
                        state.connectedPlayers[conn.peer].y = data.y;
                    }
                }
                if (data.type === 'ACTION_SWIPE') {
                    handlePlayerSwipeAction(conn.peer, data.vx, data.vy);
                }
            });

            conn.on('close', () => {
                delete state.connectedPlayers[conn.peer];
                if(state.ball.possessedBy === conn.peer) state.ball.possessedBy = null;
            });
        });

        setInterval(processRefereeServerPhysicsLoop, 33);
    }

    function broadcastGameState() {
        let playersDataSummary = [];
        for (let pId in state.connectedPlayers) {
            playersDataSummary.push({
                id: pId,
                name: state.connectedPlayers[pId].name,
                x: state.connectedPlayers[pId].x,
                y: state.connectedPlayers[pId].y
            });
        }

        let transmissionPackage = {
            type: 'STATE_SYNC',
            ball: { possessedBy: state.ball.possessedBy },
            players: playersDataSummary
        };

        for (let pId in state.connectedPlayers) {
            transmissionPackage.ball.isLocalPlayerPossessed = (state.ball.possessedBy === pId);
            if (state.ball.possessedBy === pId) {
                transmissionPackage.ball.rawX = state.ball.x;
                transmissionPackage.ball.rawY = state.ball.y;
            }
            state.connectedPlayers[pId].conn.send(transmissionPackage);
        }
    }

    function handlePlayerSwipeAction(playerId, vx, vy) {
        if (state.ball.possessedBy === playerId) {
            state.ball.possessedBy = null;
            state.ball.vx = vx * 0.2; 
            state.ball.vy = vy * 0.2;
        }
    }

    function processRefereeServerPhysicsLoop() {
        if (state.ball.possessedBy) {
            let hostOwner = state.connectedPlayers[state.ball.possessedBy];
            if (hostOwner) {
                state.ball.x = hostOwner.x;
                state.ball.y = hostOwner.y;
                state.ball.vx = 0;
                state.ball.vy = 0;
            }
        } else {
            state.ball.x += state.ball.vx;
            state.ball.y += state.ball.vy;
            state.ball.vx *= 0.94; 
            state.ball.vy *= 0.94;

            if (state.ball.x < 0) { state.ball.x = 0; state.ball.vx *= -1; }
            if (state.ball.x > 1) { state.ball.x = 1; state.ball.vx *= -1; }
            
            if (state.ball.y < 0) {
                if (state.ball.x > 0.3 && state.ball.x < 0.7) {
                    triggerGlobalGoalCelebration();
                } else {
                    state.ball.y = 0; state.ball.vy *= -1;
                }
            }
            if (state.ball.y > 1) {
                if (state.ball.x > 0.3 && state.ball.x < 0.7) {
                    triggerGlobalGoalCelebration();
                } else {
                    state.ball.y = 1; state.ball.vy *= -1;
                }
            }

            for (let pId in state.connectedPlayers) {
                let p = state.connectedPlayers[pId];
                if (p.y < RESTRICTED_ZONE_Y_LIMIT) continue; 

                let dx = state.ball.x - p.x;
                let dy = state.ball.y - p.y;
                let distance = Math.sqrt(dx*dx + dy*dy);

                if (distance < PROXIMITY_THRESHOLD) {
                    state.ball.possessedBy = pId;
                    p.conn.send({ type: 'BALL_FOUND_TRIGGER' });
                    break;
                }
            }
        }

        broadcastGameState();
        renderRefereeDiagnosticsOverlay();
    }

    function triggerGlobalGoalCelebration() {
        state.ball.x = 0.5; state.ball.y = 0.5;
        state.ball.vx = 0; state.ball.vy = 0;
        state.ball.possessedBy = null;
        for (let pId in state.connectedPlayers) {
            state.connectedPlayers[pId].conn.send({ type: 'GOAL_CELEBRATION' });
        }
    }

    /**
     * REFEREE COMPUTER VISION (REVISED LOCK-ON CAMERA)
     */
    function initRefereeHardwareCamera() {
        const video = document.getElementById('camera-feed');
        
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
            audio: false
        })
        .then(stream => {
            video.srcObject = stream;
            video.play();
            setupComputerVisionAnalysisLoop();
        })
        .catch(err => {
            setupFallbackRefereeControls();
        });

        // Exact Tap Calibration Upgrade
        document.getElementById('referee-overlay').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            const clickX = ((e.clientX - rect.left) / rect.width) * (video.videoWidth || 640);
            const clickY = ((e.clientY - rect.top) / rect.height) * (video.videoHeight || 480);
            calibrateTargetColorAtPixel(video, Math.floor(clickX), Math.floor(clickY));
        });

        document.getElementById('btn-ref-reset-ball').addEventListener('click', () => {
            state.ball.x = 0.5; state.ball.y = 0.5;
            state.ball.vx = 0; state.ball.vy = 0;
            state.ball.possessedBy = null;
        });
    }

    function calibrateTargetColorAtPixel(video, targetX, targetY) {
        const hiddenCanvas = document.createElement('canvas');
        hiddenCanvas.width = video.videoWidth || 640;
        hiddenCanvas.height = video.videoHeight || 480;
        const ctx = hiddenCanvas.getContext('2d');
        ctx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
        
        // Samples a 3x3 pixel structural framework matrix center to smooth noise
        let rSum = 0, gSum = 0, bSum = 0, totalSamples = 0;
        for(let boxX = -1; boxX <= 1; boxX++) {
            for(let boxY = -1; boxY <= 1; boxY++) {
                const pixel = ctx.getImageData(targetX + boxX, targetY + boxY, 1, 1).data;
                rSum += pixel[0]; gSum += pixel[1]; bSum += pixel[2];
                totalSamples++;
            }
        }

        state.targetColor.r = Math.floor(rSum / totalSamples);
        state.targetColor.g = Math.floor(gSum / totalSamples);
        state.targetColor.b = Math.floor(bSum / totalSamples);
        state.isColorCalibrated = true;
        
        const statusDisplay = document.getElementById('ref-status-display');
        statusDisplay.innerText = `LOCKED TRACKING: RGB(${state.targetColor.r},${state.targetColor.g},${state.targetColor.b})`;
        statusDisplay.style.color = "#39ff14";
    }

    function setupComputerVisionAnalysisLoop() {
        const video = document.getElementById('camera-feed');
        const overlayCanvas = document.getElementById('referee-overlay');
        const ctx = overlayCanvas.getContext('2d');

        function processFrameRoutine() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                if (overlayCanvas.width !== video.videoWidth) {
                    overlayCanvas.width = video.videoWidth;
                    overlayCanvas.height = video.videoHeight;
                }

                ctx.drawImage(video, 0, 0, overlayCanvas.width, overlayCanvas.height);
                const frameData = ctx.getImageData(0, 0, overlayCanvas.width, overlayCanvas.height);
                const pixels = frameData.data;

                let matchingPixelsSumX = 0;
                let matchingPixelsSumY = 0;
                let matchingCount = 0;
                const colorTolerance = 55; // Expanded tolerance matrix index

                if (state.isColorCalibrated) {
                    for (let i = 0; i < pixels.length; i += 4) {
                        let rDiff = Math.abs(pixels[i] - state.targetColor.r);
                        let gDiff = Math.abs(pixels[i+1] - state.targetColor.g);
                        let bDiff = Math.abs(pixels[i+2] - state.targetColor.b);

                        if (rDiff < colorTolerance && gDiff < colorTolerance && bDiff < colorTolerance) {
                            let index = i / 4;
                            matchingPixelsSumX += index % overlayCanvas.width;
                            matchingPixelsSumY += Math.floor(index / overlayCanvas.width);
                            matchingCount++;
                        }
                    }

                    if (matchingCount > 10 && !state.ball.possessedBy) { 
                        let targetCentroidX = (matchingPixelsSumX / matchingCount) / overlayCanvas.width;
                        let targetCentroidY = (matchingPixelsSumY / matchingCount) / overlayCanvas.height;
                        state.ball.x = state.ball.x * 0.3 + targetCentroidX * 0.7;
                        state.ball.y = state.ball.y * 0.3 + targetCentroidY * 0.7;
                    }
                }
            }
            requestAnimationFrame(processFrameRoutine);
        }
        requestAnimationFrame(processFrameRoutine);
    }

    function renderRefereeDiagnosticsOverlay() {
        const canvas = document.getElementById('referee-overlay');
        const ctx = canvas.getContext('2d');
        if(!canvas.width) return;

        ctx.clearRect(0,0, canvas.width, canvas.height);
        
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#ff3131';
        ctx.beginPath();
        ctx.moveTo(0, canvas.height * RESTRICTED_ZONE_Y_LIMIT);
        ctx.lineTo(canvas.width, canvas.height * RESTRICTED_ZONE_Y_LIMIT);
        ctx.stroke();

        ctx.fillStyle = '#39ff14';
        ctx.beginPath();
        ctx.arc(state.ball.x * canvas.width, state.ball.y * canvas.height, 14, 0, 2 * Math.PI);
        ctx.fill();

        for (let id in state.connectedPlayers) {
            let p = state.connectedPlayers[id];
            ctx.fillStyle = (state.ball.possessedBy === id) ? '#00e5ff' : '#ffffff';
            ctx.beginPath();
            ctx.arc(p.x * canvas.width, p.y * canvas.height, 16, 0, 2 * Math.PI);
            ctx.fill();
        }
    }

    function setupFallbackRefereeControls() {
        const canvas = document.getElementById('referee-overlay');
        canvas.addEventListener('mousemove', (e) => {
            if(!state.ball.possessedBy) {
                const rect = canvas.getBoundingClientRect();
                state.ball.x = (e.clientX - rect.left) / rect.width;
                state.ball.y = (e.clientY - rect.top) / rect.height;
            }
        });
    }

    /**
     * PLAYER MODULE (REVISED STABLE JOYSTICK MECHANICS)
     */
    let joystickState = { active: false, startX: 0, startY: 0, vx: 0, vy: 0 };
    let swipeCaptureState = { startX: 0, startY: 0, startTime: 0 };

    function setupPlayerNetworkListeners() {
        state.connection = state.peer.connect(`HFB-ROOM-${state.roomCode}`);

        state.connection.on('open', () => {
            state.connection.send({ type: 'JOIN', name: state.username });
            initializePlayerHardwareSystems();
        });

        state.connection.on('data', (data) => {
            if (data.type === 'STATE_SYNC') { processServerStateSynchronization(data); }
            if (data.type === 'BALL_FOUND_TRIGGER') { triggerLocalBallFoundEffects(); }
            if (data.type === 'GOAL_CELEBRATION') { triggerLocalGoalAnimationEffects(); }
        });

        state.connection.on('close', () => { location.reload(); });
    }

    function initializePlayerHardwareSystems() {
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', handleDeviceOrientationTrackingData, true);
        }
        setupPlayerRenderingEngine();
        setupTouchControllerJoystickInputControls();
        setupGlobalSwipeGestureRecognitionEngine();
    }

    function handleDeviceOrientationTrackingData(event) {
        // Mute gyro interactions entirely if the screen joystick is currently engaged
        if (joystickState.active) return;

        let tiltX = event.gamma; 
        let tiltY = event.beta;  

        if (tiltX !== null && tiltY !== null) {
            let dx = (tiltX / 90) * 0.007;
            let dy = ((tiltY - 35) / 90) * 0.007; 
            updateLocalPlayerCoordinates(state.localPlayer.x + dx, state.localPlayer.y + dy);
        }
    }

    function setupTouchControllerJoystickInputControls() {
        const zone = document.getElementById('touch-joystick-zone');
        const knob = document.getElementById('joystick-knob');

        zone.addEventListener('touchstart', (e) => {
            joystickState.active = true;
            let t = e.touches[0];
            joystickState.startX = t.clientX;
            joystickState.startY = t.clientY;
        }, {passive: true});

        window.addEventListener('touchmove', (e) => {
            if (!joystickState.active) return;
            let t = e.touches[0];
            
            let dx = t.clientX - joystickState.startX;
            let dy = t.clientY - joystickState.startY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if(dist > 50) {
                dx = (dx / dist) * 50;
                dy = (dy / dist) * 50;
            }

            knob.style.transform = `translate(${dx}px, ${dy}px)`;

            // Continuous frame velocity mapping indices
            joystickState.vx = (dx / 50) * 0.015;
            joystickState.vy = (dy / 50) * 0.015;
        }, {passive: true});

        window.addEventListener('touchend', () => {
            joystickState.active = false;
            joystickState.vx = 0;
            joystickState.vy = 0;
            knob.style.transform = 'translate(0px, 0px)';
        });
    }

    function setupGlobalSwipeGestureRecognitionEngine() {
        window.addEventListener('touchstart', (e) => {
            if(e.target.closest('#touch-joystick-zone')) return;
            let t = e.touches[0];
            swipeCaptureState.startX = t.clientX;
            swipeCaptureState.startY = t.clientY;
            swipeCaptureState.startTime = performance.now();
        }, {passive: true});

        window.addEventListener('touchend', (e) => {
            if(e.target.closest('#touch-joystick-zone')) return;
            let t = e.changedTouches[0];
            let dx = t.clientX - swipeCaptureState.startX;
            let dy = t.clientY - swipeCaptureState.startY;
            let dt = performance.now() - swipeCaptureState.startTime;

            if (dt < 350 && Math.sqrt(dx*dx + dy*dy) > 50) {
                if (state.connection && state.connection.open) {
                    state.connection.send({
                        type: 'ACTION_SWIPE',
                        vx: dx / dt,
                        vy: dy / dt
                    });
                }
            }
        });
    }

    function updateLocalPlayerCoordinates(targetX, targetY) {
        state.localPlayer.x = Math.max(0, Math.min(1, targetX));
        state.localPlayer.y = Math.max(0, Math.min(1, targetY));

        if (state.localPlayer.y < RESTRICTED_ZONE_Y_LIMIT) {
            if (!state.localPlayer.inRestrictedZone) {
                state.localPlayer.inRestrictedZone = true;
                document.getElementById('restricted-overlay').style.display = 'flex';
                if(navigator.vibrate) navigator.vibrate([150, 100, 150]);
            }
        } else {
            if (state.localPlayer.inRestrictedZone) {
                state.localPlayer.inRestrictedZone = false;
                document.getElementById('restricted-overlay').style.display = 'none';
            }
        }

        document.getElementById('player-coords-hud').innerText = `X: ${state.localPlayer.x.toFixed(2)} | Y: ${state.localPlayer.y.toFixed(2)}`;

        if (state.connection && state.connection.open && !state.localPlayer.inRestrictedZone) {
            state.connection.send({
                type: 'PLAYER_UPDATE',
                x: state.localPlayer.x,
                y: state.localPlayer.y
            });
        }
    }

    function processServerStateSynchronization(packet) {
        let matchBallState = packet.ball;
        const statusHud = document.getElementById('player-status-hud');
        const possessionHud = document.getElementById('player-possession-hud');
        const swipeTip = document.getElementById('swipe-tip');

        if (matchBallState.possessedBy) {
            if (matchBallState.isLocalPlayerPossessed) {
                statusHud.innerText = "YOU CONTROL THE BALL!";
                statusHud.style.color = "#39ff14";
                possessionHud.innerText = "POSSESSION ACTIVE";
                possessionHud.style.borderColor = "#39ff14";
                swipeTip.style.display = 'inline-block';
                
                state.ball.x = matchBallState.rawX;
                state.ball.y = matchBallState.rawY;
            } else {
                statusHud.innerText = "BALL POSSESSED BY OPPONENT";
                statusHud.style.color = "#ff3131";
                possessionHud.innerText = "NO POSSESSION";
                possessionHud.style.borderColor = '#555';
                swipeTip.style.display = 'none';
            }
        } else {
            statusHud.innerText = "SEARCHING PHYSICAL FIELD FOR BALL...";
            statusHud.style.color = '#fff';
            possessionHud.innerText = "NO POSSESSION";
            possessionHud.style.borderColor = '#555';
            swipeTip.style.display = 'none';
        }
        state.connectedPlayers = packet.players;
    }

    function triggerLocalBallFoundEffects() {
        if(navigator.vibrate) navigator.vibrate(300);
        const fx = document.getElementById('ball-found-effect');
        fx.style.display = 'flex';
        setTimeout(() => fx.style.display = 'none', 1200);
    }

    function triggerLocalGoalAnimationEffects() {
        if(navigator.vibrate) navigator.vibrate([100, 50, 300]);
        const fx = document.getElementById('goal-effect');
        fx.style.display = 'flex';
        setTimeout(() => fx.style.display = 'none', 2500);
    }

    function setupPlayerRenderingEngine() {
        const canvas = document.getElementById('player-rendering-canvas');
        const ctx = canvas.getContext('2d');

        function drawLoopFrame() {
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            // Engine Continuous Velocity Frame Updates
            if (joystickState.active && !state.localPlayer.inRestrictedZone) {
                updateLocalPlayerCoordinates(state.localPlayer.x + joystickState.vx, state.localPlayer.y + joystickState.vy);
            }

            ctx.clearRect(0,0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 4;
            ctx.strokeRect(canvas.width * 0.25, 0, canvas.width * 0.5, canvas.height * 0.18);
            ctx.strokeRect(canvas.width * 0.25, canvas.height * 0.82, canvas.width * 0.5, canvas.height * 0.18);
            
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, canvas.width * 0.15, 0, 2*Math.PI);
            ctx.stroke();

            ctx.fillStyle = 'rgba(255, 49, 49, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height * RESTRICTED_ZONE_Y_LIMIT);
            ctx.strokeStyle = 'rgba(255, 49, 49, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height * RESTRICTED_ZONE_Y_LIMIT);
            ctx.lineTo(canvas.width, canvas.height * RESTRICTED_ZONE_Y_LIMIT);
            ctx.stroke();

            if (Array.isArray(state.connectedPlayers)) {
                state.connectedPlayers.forEach(p => {
                    if (p.id === state.peer.id) return; 
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.beginPath();
                    ctx.arc(p.x * canvas.width, p.y * canvas.height, 14, 0, 2 * Math.PI);
                    ctx.fill();
                });
            }

            const localPixelX = state.localPlayer.x * canvas.width;
            const localPixelY = state.localPlayer.y * canvas.height;

            ctx.fillStyle = "#00e5ff";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00e5ff";
            ctx.beginPath();
            ctx.arc(localPixelX, localPixelY, 18, 0, 2 * Math.PI);
            ctx.fill();
            ctx.shadowBlur = 0; 

            if (state.connection && state.connection.open && state.ball.possessedBy === state.peer.id) {
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffffff';
                ctx.beginPath();
                ctx.arc(localPixelX, localPixelY - 25, 10, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(drawLoopFrame);
        }
        requestAnimationFrame(drawLoopFrame);
    }
</script>
